name: Deploy to Cesky Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate api/config.php with secrets
        env:
          APP_URL:              ${{ secrets.APP_URL }}
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_NAME:              ${{ secrets.DB_NAME }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASS:              ${{ secrets.DB_PASS }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MAIL_FROM:            ${{ secrets.MAIL_FROM }}
          BREVO_API_KEY:        ${{ secrets.BREVO_API_KEY }}
          SESSION_SECRET:       ${{ secrets.SESSION_SECRET }}
        run: |
          mkdir -p api
          python3 - <<'PYEOF'
          import os
          lines = ["<?php", "// Auto-generated by CI — neupravovat ručně"]
          for k in ["APP_URL","DB_HOST","DB_NAME","DB_USER","DB_PASS",
                    "GOOGLE_CLIENT_ID","GOOGLE_CLIENT_SECRET",
                    "MAIL_FROM","BREVO_API_KEY","SESSION_SECRET"]:
              v = os.environ.get(k, "").replace("\\","\\\\").replace("'","\\'")
              lines.append(f"putenv('{k}={v}');")
          open("api/config.php","w").write("\n".join(lines)+"\n")
          print("config.php generated")
          PYEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ${{ secrets.FTP_SERVER }}
          username:         ${{ secrets.FTP_USERNAME }}
          password:         ${{ secrets.FTP_PASSWORD }}
          local-dir:        ./
          server-dir:       /www/
          exclude:          |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .gitignore
