name: Deploy to Cesky Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate api/config.php with secrets
        env:
          APP_URL:              ${{ secrets.APP_URL }}
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_NAME:              ${{ secrets.DB_NAME }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASS:              ${{ secrets.DB_PASS }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MAIL_FROM:            ${{ secrets.MAIL_FROM }}
          BREVO_API_KEY:        ${{ secrets.BREVO_API_KEY }}
          SESSION_SECRET:       ${{ secrets.SESSION_SECRET }}
        run: |
          mkdir -p api
          python3 - <<'PYEOF'
          import os
          lines = [
            "<?php",
            "// Auto-generated by CI — neupravovat ručně",
          ]
          keys = [
            "APP_URL","DB_HOST","DB_NAME","DB_USER","DB_PASS",
            "GOOGLE_CLIENT_ID","GOOGLE_CLIENT_SECRET",
            "MAIL_FROM","BREVO_API_KEY","SESSION_SECRET"
          ]
          for k in keys:
              v = os.environ.get(k, "")
              v_esc = v.replace("\\", "\\\\").replace("'", "\\'")
              lines.append(f"putenv('{k}={v_esc}');")
          with open("api/config.php", "w") as f:
              f.write("\n".join(lines) + "\n")
          print("config.php generated")
          PYEOF

      - name: Setup SSH and deploy to hosting
        env:
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 green.thinline.cz >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          git remote add hosting "ssh://besix_cz__git@green.thinline.cz/~/besix.cz"
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          # Zahrň vygenerovaný config.php do deploye (jen na hosting, ne na GitHub)
          git add -f api/config.php
          git commit -m "ci: inject runtime config" --allow-empty
          export SSHPASS="$GIT_PASSWORD"
          GIT_SSH_COMMAND="sshpass -e ssh -o StrictHostKeyChecking=no" git push hosting HEAD:main --force
