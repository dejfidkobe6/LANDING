name: Deploy to Cesky Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH and push to hosting Git
        env:
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 green.thinline.cz >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          git remote add hosting "ssh://besix_cz__git@green.thinline.cz/~/besix.cz"
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          export SSHPASS="$GIT_PASSWORD"
          GIT_SSH_COMMAND="sshpass -e ssh -o StrictHostKeyChecking=no" git push hosting main --force
