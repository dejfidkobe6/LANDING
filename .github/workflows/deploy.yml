name: Deploy to Cesky Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup SSH and push to hosting Git
        env:
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          git remote add hosting "ssh://besix_cz__git@green.thinline.cz/~/besix.cz"
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          sshpass -p "$GIT_PASSWORD" git push hosting main --force
